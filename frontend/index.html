<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Rememory - A Space for Healing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #F5F5F4;
        color: #292524;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }
      
      .bg-noise {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
        opacity: 0.03;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      .aurora-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        background: 
          radial-gradient(at 0% 0%, hsla(253,16%,7%,0) 0, transparent 50%), 
          radial-gradient(at 50% 10%, hsla(225,39%,85%,1) 0, transparent 50%), 
          radial-gradient(at 90% 20%, hsla(339,49%,90%,1) 0, transparent 40%);
        animation: aurora 20s ease infinite alternate;
      }

      @keyframes aurora {
        0% { filter: hue-rotate(0deg); }
        100% { filter: hue-rotate(10deg); }
      }

      h1, h2, h3, h4, h5, h6 {
        font-family: 'Lora', serif;
      }

      .font-display {
        font-family: 'Playfair Display', serif;
      }

      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background-color: #d6d3d1;
        border-radius: 20px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background-color: #a8a29e;
      }

      .glass-panel {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.5);
      }
    </style>
  </head>
  <body>
    <div class="bg-noise"></div>
    <div class="aurora-bg"></div>
    <div id="root" class="relative z-10 h-screen w-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
